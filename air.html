<html>
<head>
<style>
body {
    font-family: Arial;
    text-align: center;
    margin: 20px;
}

img {
    max-width: 90%;
    margin: 10px 0;
}

button {
    font-size: 18px;
    padding: 8px 16px;
    margin: 10px;
}

.tabs {
    margin-bottom: 20px;
}

.tab-btn {
    background-color: #f1f1f1;
    border: 1px solid #ccc;
    cursor: pointer;
    font-size: 16px;
    padding: 10px 20px;
    margin: 0 5px;
}

.tab-btn.active {
    background-color: #28a745; /* Different active color for distinction */
    color: white;
    border-color: #28a745;
}
</style>
</head>

<body>

<div class="tabs">
    <button class="tab-btn" onclick="location.href='sea.html'">Sea Data</button>
    <button class="tab-btn active" onclick="location.href='air.html'">Air Data</button>
    <button class="tab-btn" onclick="location.href='sea_time.html'">Sea Time Domain</button>
</div>

<h2>Air FFT Analysis & Atmospheric Layout</h2>

<button onclick="prev()">← Prev</button>
<button onclick="next()">Next →</button>

<img id="plot">

<script>
const steps = [
    "air_fft_raw.png",
    "air_fft_raw-annual-semiannual-thirdannual.png",
    "air_fft_raw-select 2026Mar1.png",
    "air_fft_raw-select 2026Mar1-High-1.png",
    "air_fft_raw-select 2026Mar1-High 2.png",
    "air_fft_raw-select 2026Mar1-High 3-Freq3.png"
];

let i = 0;

function render() {
    document.getElementById("plot").src = "images/" + steps[i];
}

function next() {
    if (i < steps.length - 1) {
        i++;
        render();
    }
}

function prev() {
    if (i > 0) {
        i--;
        render();
    }
}

render();
</script>

</body>
</html>
