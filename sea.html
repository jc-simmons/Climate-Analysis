<html>
<head>
<style>
body {
    font-family: Arial;
    text-align: center;
    margin: 20px;
}

img {
    max-width: 90%;
    margin: 10px 0;
}

button {
    font-size: 18px;
    padding: 8px 16px;
    margin: 10px;
}

.tabs {
    margin-bottom: 20px;
}

.tab-btn {
    background-color: #f1f1f1;
    border: 1px solid #ccc;
    cursor: pointer;
    font-size: 16px;
    padding: 10px 20px;
    margin: 0 5px;
}

.tab-btn.active {
    background-color: #007bff;
    color: white;
    border-color: #007bff;
}
</style>
</head>

<body>

<div class="tabs">
    <button class="tab-btn active" onclick="location.href='sea.html'">Sea Data</button>
    <button class="tab-btn" onclick="location.href='air.html'">Air Data</button>
</div>

<h2>Sea FFT Node Flattening Progression</h2>

<button onclick="prev()">← Prev</button>
<button onclick="next()">Next →</button>

<img id="plot">

<script>
const steps = [
    "sea_fft_raw.png",
    "sea_fft_raw-annual.png",
    "sea_fft_raw-annual-seasonal.png",
    "sea_fft_raw-annual-seasonal-fourM.png",
    "sea_fft_raw-asf-9 yrs.png",
    "sea_fft_raw-asf-9 yrs-4.4yrs.png",
    "sea_fft_raw-asf-9 yrs-4.4yrs-3.7yrs.png",
    "sea_fft_raw-asf-9 yrs-4.4yrs-3.7yrs-2.75yrs.png",
    "sea_fft_raw-asf-9-4.4-3.7-2.7-2k-1k.png",
    "sea_fft_raw-asf-9-4.4-3.7-2.7-2k-1k-triplet.png",
    "sea_fft_raw-asf-9-4.4-3.7-2.7-2k-1k-t-noise.png"
];

let i = 0;

function render() {
    document.getElementById("plot").src = "images/" + steps[i];
}

function next() {
    if (i < steps.length - 1) {
        i++;
        render();
    }
}

function prev() {
    if (i > 0) {
        i--;
        render();
    }
}

render();
</script>

</body>
</html>
